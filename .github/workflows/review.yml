name: Review

# Requests a CodeRabbit review once CI is green, instead of on every push.
# Triggered by the CI workflow finishing successfully on a PR; pairs with
# .coderabbit.yaml's `auto_review.enabled: false` so this is the sole trigger.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-review:
    name: Request CodeRabbit review
    # Only for PR runs that succeeded — skip pushes to main and failed runs.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate Scout app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SCOUT_APP_ID }}
          private-key: ${{ secrets.SCOUT_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Comment @coderabbitai review on the green PR
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            echo "No open PR for branch '$BRANCH' — nothing to review."
            exit 0
          fi
          gh pr comment "$PR" --body "@coderabbitai review"
          echo "Requested CodeRabbit review on PR #$PR (CI passed on $BRANCH)."
