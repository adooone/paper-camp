name: Sync PR Metadata

on:
  push:
    branches:
      - feat/*
      - fix/*
      - refactor/*
      - chore/*
      - docs/*

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-pr-metadata:
    name: Sync PR Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The CLI runs under bun ("cli": "bun src/cli/index.ts").
      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Generate Scout app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SCOUT_APP_ID }}
          private-key: ${{ secrets.SCOUT_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      # Best-effort: on the very first push draft-pr.yml may not have created
      # the PR yet, in which case there's nothing to sync into — don't fail
      # the workflow over a race that resolves itself on the next push.
      - name: Render plan phases into PR body
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli sync-pr-phases "$BRANCH"
        continue-on-error: true

      # Labels are created idempotently and only ever added, never removed —
      # a human-applied label always survives this step.
      - name: Apply labels from plan kind/tags
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli sync-pr-labels "$BRANCH"
        continue-on-error: true

      # Retitles the PR to `<type>(<scope>): <Idea title> (IDEA-N)` so a squash-merge
      # inherits a valid conventional-commit title as the release commit.
      - name: Retitle PR to a conventional commit from the idea
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli sync-pr-title "$BRANCH"
        continue-on-error: true

      # Not best-effort: fails the check (no continue-on-error) if the PR title still
      # isn't conventional — e.g. hand-retitled after the sync step above ran — so a
      # squash-merge can't silently drop the commit out of the release notes.
      - name: Validate PR title is a conventional commit
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli validate-pr-title "$BRANCH"

      # One-way, plan -> PR: flips a draft PR to ready once every phase is
      # checked, or closes it when the plan carries a `dropped` override.
      # Never writes plan status back — merge -> done is IDEA-56's derivation.
      - name: Flip PR readiness from phases and the dropped override
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli sync-pr-readiness "$BRANCH"
        continue-on-error: true

      # Upserts a single sticky comment — safe to rerun on every push, it only
      # edits/creates when the rendered checks actually changed.
      - name: Post consistency checks as a PR comment
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm cli sync-pr-consistency "$BRANCH"
        continue-on-error: true
