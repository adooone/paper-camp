name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check types
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # The CLI runs under bun ("cli": "bun src/cli/index.ts"), and
      # src/cli/audit.test.ts spawns `bun` as a real subprocess — without it
      # spawnSync returns stdout: null and those tests fail.
      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

  consistency:
    name: Consistency
    # Codebase-structure consistency (dead code + architecture boundaries).
    # Commit-message linting moved to the local commit-msg git hook (husky).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # Dead code: fail on unused files and unused dependencies (high-confidence).
      # Unused exports/types still surface locally via `pnpm run knip`.
      - name: Dead code (knip)
        run: npx knip --include files,dependencies

      # Architecture: no forbidden cross-layer imports, no unresolvable imports.
      - name: Architecture boundaries (dependency-cruiser)
        run: pnpm run depcruise
